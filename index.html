<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAPL Theory Mock Test | Apollo Global Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div id="gate" class="gate-overlay" aria-labelledby="gateTitle">
        <form class="gate-modal" id="gateForm">
            <div class="gate-brand">
                <img src="AGA_Logo_fullcolor_Horizontal.png" alt="Apollo Global Academy" class="gate-logo" onerror="this.style.display='none'">
                <div class="gate-mark" aria-hidden="true">U</div>
            </div>
            <h1 id="gateTitle">UAPL Training Portal</h1>
            <p class="gate-subtitle">Enter your learner access code to continue.</p>

            <label class="sr-only" for="accessCode">Access code</label>
            <input type="password" id="accessCode" placeholder="Access code" autocomplete="off" required>
            <button type="submit">Sign In</button>
            <p id="errorMsg" class="error-msg" aria-live="polite"></p>
            <small>Authorized learners only</small>
        </form>
    </div>

    <div id="app" class="app" hidden>
        <header class="app-header">
            <div class="brand-block">
                <img src="AGA_Logo_fullcolor_Horizontal.png" alt="Apollo Global Academy Logo" class="site-logo" onerror="this.style.display='none'">
                <div>
                    <p class="eyebrow">Apollo Global Academy</p>
                    <h1>UAPL Theory Mock Test</h1>
                </div>
            </div>
            <button id="navToggle" class="nav-icon-btn" type="button" onclick="openNavigation()" aria-label="Open question navigation">
                <span></span><span></span><span></span>
            </button>
        </header>

        <section class="control-bar" aria-label="Study controls">
            <div class="mode-tabs" role="tablist" aria-label="Study mode">
                <button id="quizTab" class="active tab-btn" type="button" onclick="switchMode('quiz')" role="tab" aria-selected="true">
                    <span aria-hidden="true">✓</span> Quiz
                </button>
                <button id="flashTab" class="tab-btn" type="button" onclick="switchMode('flash')" role="tab" aria-selected="false">
                    <span aria-hidden="true">▣</span> Flashcards
                </button>
            </div>

            <div class="settings-row">
                <label class="switch-control">
                    <input type="checkbox" id="shuffleToggle">
                    <span>Shuffle</span>
                </label>
                <label class="switch-control">
                    <input type="checkbox" id="timerToggle">
                    <span>Timer</span>
                </label>
                <button class="secondary-btn" type="button" onclick="startNewQuiz()">New Quiz</button>
            </div>
        </section>

        <div id="navOverlay" class="nav-overlay" onclick="closeNavigation()"></div>

        <aside id="quizNavPanel" class="nav-panel" aria-label="Quiz navigation">
            <div class="nav-header">
                <div>
                    <p class="eyebrow">Quiz</p>
                    <h2>Question Map</h2>
                </div>
                <button class="nav-close" type="button" onclick="closeNavigation()" aria-label="Close navigation">×</button>
            </div>
            <div id="quizNav" class="question-nav"></div>
        </aside>

        <aside id="flashNavPanel" class="nav-panel" aria-label="Flashcard navigation">
            <div class="nav-header">
                <div>
                    <p class="eyebrow">Flashcards</p>
                    <h2>Card Map</h2>
                </div>
                <button class="nav-close" type="button" onclick="closeNavigation()" aria-label="Close navigation">×</button>
            </div>
            <div id="flashNav" class="question-nav"></div>
        </aside>

        <section id="quizPanel" class="panel active">
            <main>
                <div class="status-card">
                    <div class="status-row">
                        <span id="quizCounter">Question 1</span>
                        <span id="timerDisplay">Timer Off</span>
                        <span id="scoreCounter">Score: 0</span>
                    </div>
                    <div class="progress-track"><div id="quizProgressBar"></div></div>
